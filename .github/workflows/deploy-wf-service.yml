name: New Deploy workflows-service image

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Choose Environment'
        required: true
        default: 'dev'
        options:
          - 'sb'
          - 'prod'

        
  workflow_call:
    inputs:
      environment:
        type: string
        description: 'Environment'
        required: true
        default: 'dev'
      sha:
        type: string
        description: 'SHA ID'
        required: true


env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/workflows-service
  SHORT_HASH: ${{ (inputs.environment == 'dev' && inputs.sha) || (inputs.environment == 'prod' && vars.SB_WF_SHORT_SHA) || (vars.DEV_WF_SHORT_SHA) }}

jobs:
  set_short_hash:
    runs-on: ubuntu-latest
    steps:
      - name: Verify SHORT_HASH
        run: |
          echo "SHORT_HASH is ${{ env.SHORT_HASH }}"
          echo "SHORT_HASH is ${{ env.SHORT_HASH }}"
          echo "SHORT_HASH is $SHORT_HASH"

  tag-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          echo "sha_short=${{ env.SHORT_HASH }}" >> $GITHUB_OUTPUT
          if [ "${{ inputs.environment }}" == "prod" ]; then
          echo "PROD_WF_SHORT_SHA=${{ env.SHORT_HASH }}" >> $GITHUB_ENV
          else
          echo "SB_WF_SHORT_SHA=${{ env.SHORT_HASH }}" >> $GITHUB_ENV
          fi

      - name: Update Service version in Environment
        if: ${{ inputs.environment != 'dev' }}
        run: |
          if [ "${{ inputs.environment }}" == "prod" ]; then
            ENV="PROD"
          elif [ "${{ inputs.environment }}" == "sb" ]; then
            ENV="SB"
          else
            ENV="DEV"
          fi
          echo "$ENV"
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_CI_ENV_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/ballerine-io/ballerine/actions/variables/${ENV^^}_WF_SHORT_SHA" \
            -d "{\"name\":\"${ENV}_WF_SHORT_SHA\",\"value\":\"${{ env.SHORT_HASH }}\"}"

      - name: Cache Docker layers
        id: cache
        uses: actions/cache@v2
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-${{ hashFiles('**/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-docker-${{ hashFiles('**/Dockerfile') }}
            ${{ runner.os }}-docker-
  
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        with:
          platforms: 'arm64,arm'

      - name: Log in to the container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and Tag Existing Image
        if: ${{ inputs.environment != 'dev' }}
        run: |
          if [ "${{ inputs.environment }}" == "prod" ]; then
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:${{ env.SHORT_HASH }}-sb
            docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:${{ env.SHORT_HASH }}-sb ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:${{ env.SHORT_HASH }}-${{ inputs.environment }}
            docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:${{ env.SHORT_HASH }}-sb ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:${{ inputs.environment }}
            docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:${{ env.SHORT_HASH }}-sb ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:latest
            docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:latest
          else
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:${{ env.SHORT_HASH }}-dev
            docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:${{ env.SHORT_HASH }}-dev ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:${{ env.SHORT_HASH }}-${{ inputs.environment }}
            docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:${{ env.SHORT_HASH }}-dev ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:${{ inputs.environment }}
          fi
          docker images
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:${{ env.SHORT_HASH }}-${{ inputs.environment }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}:${{ inputs.environment }}

  build-and-push-ee-image:
    runs-on: ubuntu-latest
    needs: [tag-and-push-image]
    outputs:
      SUBMODULE_SHORT_HASH: ${{ steps.lastcommit.outputs.shorthash }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Checkout wf-data-migration
        uses: actions/checkout@v4
        with:
          repository: ballerine-io/wf-data-migration
          token: ${{ secrets.SUBMODULES_TOKEN }}
          ref: ${{ inputs.environment }}
          fetch-depth: 1
          path: services/workflows-service/prisma/data-migrations

      - name: Get Latest Commit ID
        id: lastcommit
        uses: nmbgeek/github-action-get-latest-commit@main
        with:
          owner: ${{ github.repository_owner }}
          token: ${{ secrets.SUBMODULES_TOKEN }}
          repo: wf-data-migration
          branch: ${{ inputs.environment }}

      - name: Set Commit Id as Env 
        run: echo "SUBMODULE_SHORT_HASH=${{ steps.lastcommit.outputs.shorthash }}" >> $GITHUB_ENV
      
      - name: Cache Docker layers
        id: cache
        uses: actions/cache@v2
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-${{ hashFiles('**/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-docker-${{ hashFiles('**/Dockerfile') }}
            ${{ runner.os }}-docker-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        with:
          platforms: 'arm64,arm'

      - name: Log in to the container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for ee Docker images
        id: eemeta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}-ee
          tags: |
            type=raw,value=${{ inputs.environment }}
            type=raw,value=${{ env.SHORT_HASH }}-${{ steps.lastcommit.outputs.shorthash }}-${{ inputs.environment }}
            type=raw,value=latest,enable=${{ inputs.environment == 'prod' }}
            type=sha,format=short
            
      - name: Build and push ee Docker image
        uses: docker/build-push-action@v5
        with:
          context: services/workflows-service
          file: services/workflows-service/Dockerfile.ee
          platforms: linux/amd64
          push: true
          cache-from: type=local,src=/tmp/.buildx-cache
          tags: ${{ steps.eemeta.outputs.tags }}
          build-args: |
            "BASE_IMAGE=ghcr.io/${{ github.repository_owner }}/workflows-service:${{ env.SHORT_HASH }}-${{ inputs.environment }}"
  
  update-helm-chart:
    runs-on: ubuntu-latest
    needs: build-and-push-ee-image
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout cloud-infra-config repository
        uses: actions/checkout@v4
        with:
          repository: ballerine-io/cloud-infra-config
          token: ${{ secrets.GIT_TOKEN }}
          ref: main
          fetch-depth: 1
          sparse-checkout: |
            kubernetes/helm/wf-service
          sparse-checkout-cone-mode: true
      - name: Check if values yaml file exists 
        id: update_helm_check
        shell: bash
        run: |
          if [ -f "kubernetes/helm/wf-service/${{ inputs.environment }}-custom-values.yaml" ]; then
            echo "file_name=${{ inputs.environment }}-custom-values.yaml" >> "$GITHUB_OUTPUT"
            echo ${{ env.SHORT_HASH }}-${{ needs.build-and-push-ee-image.outputs.SUBMODULE_SHORT_HASH }}
          else
            echo "file_name=dev-custom-values.yaml" >> "$GITHUB_OUTPUT"
            echo ${{ env.SHORT_HASH }}-${{ needs.build-and-push-ee-image.outputs.SUBMODULE_SHORT_HASH }}
          fi
            
      - name: Update workflow-service image version in the HelmChart
        uses: fjogeleit/yaml-update-action@main
        with:
          repository: ballerine-io/cloud-infra-config
          branch: main
          commitChange: true
          message: "Update ${{ inputs.environment }} wf-service image Version to ${{ env.SHORT_HASH }}-${{ needs.build-and-push-ee-image.outputs.SUBMODULE_SHORT_HASH }}-${{ inputs.environment }} - (Commit hash: ${{ github.sha }}, commit message: ${{ github.event.head_commit.message }})"
          token: ${{ secrets.GIT_TOKEN }}
          changes: |
            {
              "kubernetes/helm/wf-service/${{steps.update_helm_check.outputs.file_name}}": {
                "image.tag": "${{ env.SHORT_HASH }}-${{ needs.build-and-push-ee-image.outputs.SUBMODULE_SHORT_HASH }}-${{ inputs.environment }}",
                "prismaMigrate.image.tag": "${{ env.SHORT_HASH }}-${{ needs.build-and-push-ee-image.outputs.SUBMODULE_SHORT_HASH }}-${{ inputs.environment }}",
                "dbMigrate.image.tag": "${{ env.SHORT_HASH }}-${{ needs.build-and-push-ee-image.outputs.SUBMODULE_SHORT_HASH }}-${{ inputs.environment }}",
                "dataSync.image.tag": "${{ env.SHORT_HASH }}-${{ needs.build-and-push-ee-image.outputs.SUBMODULE_SHORT_HASH }}-${{ inputs.environment }}"
              }
            }
  send-to-slack:
    runs-on: ubuntu-latest
    needs: [update-helm-chart,build-and-push-ee-image]
    if: ${{ needs.update-helm-chart.result == 'success' }}
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Send alert to Slack channel
        id: slack
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: '${{ secrets.ARGO_SLACK_CHANNEL_ID }}'
          slack-message: "Test Wf-service Deployment in ${{ inputs.environment }} with tag ${{ env.SHORT_HASH }}-${{ needs.build-and-push-ee-image.outputs.SUBMODULE_SHORT_HASH }}-${{ inputs.environment }} build result: ${{ job.status }}. successfully updated the wf-service helm values for ${{ inputs.environment }}."
        env:
          SLACK_BOT_TOKEN: ${{ secrets.ARGO_SLACK_BOT_TOKEN }}

  # TODO Check Prisma Migrate Status
  check-prisma-migrate-status:
    runs-on: ubuntu-latest
    needs: [update-helm-chart,build-and-push-ee-image]
    if: ${{ needs.update-helm-chart.result == 'success' }}
    environment: ${{ inputs.environment }}
    steps:
      - name: Pre-Run Wait
        run: |
          sleep 15
      - name: Check Prisma Migrate Status
        id: prisma-status
        run: |
          ARGOCD_API_URL="${{ secrets.ARGOCD_SERVER }}/api/v1/applications/wf-service/resource?name=wf-service-prisma-migrate&appNamespace=argocd&namespace=default&resourceName=wf-service-prisma-migrate&version=v1&kind=Job&group=batch"

          TARGET_IMAGE_TAG="${{ env.SHORT_HASH }}-${{ needs.build-and-push-ee-image.outputs.SUBMODULE_SHORT_HASH }}-${{ inputs.environment }}"
          TOKEN=$(curl -k --insecure -s -X POST "${{ secrets.ARGOCD_SERVER }}/api/v1/session" \
          -d '{"username": "'"${{ secrets.ARGOCD_USERNAME }}"'", "password": "'"${{ secrets.ARGOCD_PASSWORD }}"'"}' \
          -H "Content-Type: application/json" | jq -r '.token')
          echo "ARGOCD_TOKEN=$TOKEN" >> $GITHUB_ENV
          while true; do
              # Fetch job status from ArgoCD API
              RESPONSE=$(curl -s -k -H "Authorization: Bearer $ARGOCD_TOKEN" "$ARGOCD_API_URL")
              # echo $RESPONSE

              # Extract and parse the manifest JSON
              MANIFEST=$(echo "$RESPONSE" | jq -r '.manifest' | jq '.')
              # echo $MANIFEST

              # Extract Start Time, Status, and Type
              # START_TIME=$(echo "$MANIFEST" | jq -r '.status.startTime')
              # echo $START_TIME
              STATUS=$(echo "$MANIFEST" | jq -r '.status.conditions[] | select(.type=="Complete") | .status')
              echo $STATUS
              TYPE=$(echo "$MANIFEST" | jq -r '.status.conditions[] | select(.type=="Complete") | .type')
              echo $TYPE

              # Extract Image Tag
              IMAGE=$(echo "$MANIFEST" | jq -r '.spec.template.spec.containers[0].image')
              # echo $IMAGE
              IMAGE_TAG=$(echo "$IMAGE" | cut -d ':' -f2)  # Extract the tag after the colon
              echo $IMAGE_TAG

              # Print extracted information
              # echo "Start Time: $START_TIME"
              echo "Status: $STATUS"
              echo "Type: $TYPE"
              # echo "Image: $IMAGE"
              echo "Image Tag: $IMAGE_TAG"

              # Nested condition to check Image Tag and Job Completion
              if [[ "$IMAGE_TAG" == "$TARGET_IMAGE_TAG" ]]; then
                  if [[ "$TYPE" == "Complete" && "$STATUS" == "True" ]]; then
                      echo "✅ Prisma Job has completed successfully with the correct image tag: $IMAGE_TAG"
                      break
                  else
                      echo "⏳ Prisma Job is still running... Waiting for completion."
                  fi
              else
                  echo "🚨 Image tag mismatch! Expected: $TARGET_IMAGE_TAG, Found: $IMAGE_TAG"
              fi

              # Wait before the next check
              sleep 10
          done
          
  # TODO Check Application Deployment Status
  check-wf-service-status:
    runs-on: ubuntu-latest
    needs: [check-prisma-migrate-status,build-and-push-ee-image]
    if: ${{ needs.check-prisma-migrate-status.result == 'success' }}
    environment: ${{ inputs.environment }}
    steps:
      - name: Pre-Run Wait
        run: |
          sleep 15
      - name: Check Prisma Migrate Status
        id: prisma-status
        run: |
          ARGOCD_API_URL="${{ secrets.ARGOCD_SERVER }}/api/v1/applications/wf-service/resource?name=wf-service-db-data-migrations&appNamespace=argocd&namespace=default&resourceName=wf-service&version=v1&kind=Deployment&group=apps"

          TARGET_IMAGE_TAG="${{ env.SHORT_HASH }}-${{ needs.build-and-push-ee-image.outputs.SUBMODULE_SHORT_HASH }}-${{ inputs.environment }}"

          while true; do
              # Fetch job status from ArgoCD API
              RESPONSE=$(curl -s -k -H "Authorization: Bearer ${{env.ARGOCD_TOKEN}}" "$ARGOCD_API_URL")
          #    echo $RESPONSE

              # Extract and parse the manifest JSON
              MANIFEST=$(echo "$RESPONSE" | jq -r '.manifest' | jq '.')
          #    echo $MANIFEST

              # Extract Start Time, Status, and Type
              # START_TIME=$(echo "$MANIFEST" | jq -r '.status.startTime')
              # echo $START_TIME
              STATUS=$(echo "$MANIFEST" | jq -r '.status.conditions[] | select(.type=="Progressing") | .status')
              echo $STATUS
              REASON=$(echo "$MANIFEST" | jq -r '.status.conditions[] | select(.type=="Progressing") | .reason')
              echo $REASON

              # Extract Image Tag
              IMAGE=$(echo "$MANIFEST" | jq -r '.spec.template.spec.containers[0].image')
              echo $IMAGE
              IMAGE_TAG=$(echo "$IMAGE" | cut -d ':' -f2)  # Extract the tag after the colon
              echo $IMAGE_TAG

              # Print extracted information
              echo "Start Time: $START_TIME"
              echo "Status: $STATUS"
              echo "Type: $REASON"
              echo "Image: $IMAGE"
              echo "Image Tag: $IMAGE_TAG"

              # Nested condition to check Image Tag and Job Completion
              if [[ "$IMAGE_TAG" == "$TARGET_IMAGE_TAG" ]]; then
                  if [[ "$REASON" == "NewReplicaSetAvailable" && "$STATUS" == "True" ]]; then
                      echo "✅ Deployment has been successful with the correct image tag: $IMAGE_TAG"
                      break
                  else
                      echo "⏳ Replicaset is still getting updated... Waiting for completion."
                  fi
              else
                  echo "🚨 Image tag mismatch! Expected: $TARGET_IMAGE_TAG, Found: $IMAGE_TAG"
              fi

              # Wait before the next check
              sleep 10
          done


  # TODO Check DB Migrate Status
  check-db-migrate-status:
    runs-on: ubuntu-latest
    needs: [check-wf-service-status,build-and-push-ee-image]
    if: ${{ needs.check-wf-service-status.result == 'success' }}
    environment: ${{ inputs.environment }}
    steps:
      - name: Pre-Run Wait
        run: |
          sleep 15
      - name: Check Prisma Migrate Status
        id: prisma-status
        run: |
          ARGOCD_API_URL="${{ secrets.ARGOCD_SERVER }}/api/v1/applications/wf-service/resource?name=wf-service-db-data-migrations&appNamespace=argocd&namespace=default&resourceName=wf-service-db-data-migrations&version=v1&kind=Job&group=batch"

          TARGET_IMAGE_TAG="${{ env.SHORT_HASH }}-${{ needs.build-and-push-ee-image.outputs.SUBMODULE_SHORT_HASH }}-${{ inputs.environment }}"
          while true; do
              # Fetch job status from ArgoCD API
              RESPONSE=$(curl -s -k -H "Authorization: Bearer ${{env.ARGOCD_TOKEN}}" "$ARGOCD_API_URL")
          #    echo $RESPONSE

              # Extract and parse the manifest JSON
              MANIFEST=$(echo "$RESPONSE" | jq -r '.manifest' | jq '.')
          #    echo $MANIFEST

              # Extract Start Time, Status, and Type
              START_TIME=$(echo "$MANIFEST" | jq -r '.status.startTime')
              echo $START_TIME
              STATUS=$(echo "$MANIFEST" | jq -r '.status.conditions[] | select(.type=="Complete") | .status')
              echo $STATUS
              TYPE=$(echo "$MANIFEST" | jq -r '.status.conditions[] | select(.type=="Complete") | .type')
              echo $TYPE

              # Extract Image Tag
              IMAGE=$(echo "$MANIFEST" | jq -r '.spec.template.spec.containers[0].image')
              echo $IMAGE
              IMAGE_TAG=$(echo "$IMAGE" | cut -d ':' -f2)  # Extract the tag after the colon
              echo $IMAGE_TAG

              # Print extracted information
              echo "Start Time: $START_TIME"
              echo "Status: $STATUS"
              echo "Type: $TYPE"
              echo "Image: $IMAGE"
              echo "Image Tag: $IMAGE_TAG"

              # Nested condition to check Image Tag and Job Completion
              if [[ "$IMAGE_TAG" == "$TARGET_IMAGE_TAG" ]]; then
                  if [[ "$TYPE" == "Complete" && "$STATUS" == "True" ]]; then
                      echo "✅ DB Migrate Job has completed successfully with the correct image tag: $IMAGE_TAG"
                      break
                  else
                      echo "⏳ DB Migrate Job is still running... Waiting for completion."
                  fi
              else
                  echo "🚨 Image tag mismatch! Expected: $TARGET_IMAGE_TAG, Found: $IMAGE_TAG"
              fi

              # Wait before the next check
              sleep 10
          done

  # TODO Check DB Sync Status
  check-db-sync-status:
    runs-on: ubuntu-latest
    needs: [check-db-migrate-status,build-and-push-ee-image]
    if: ${{ needs.check-db-migrate-status.result == 'success' }}
    environment: ${{ inputs.environment }}
    steps:
      - name: Pre-Run Wait
        run: |
          sleep 15
      - name: Check Prisma Migrate Status
        id: prisma-status
        run: |
          ARGOCD_API_URL="${{ secrets.ARGOCD_SERVER }}/api/v1/applications/wf-service/resource?name=wf-service-db-data-sync&appNamespace=argocd&namespace=default&resourceName=wf-service-db-data-sync&version=v1&kind=Job&group=batch"

          TARGET_IMAGE_TAG="${{ env.SHORT_HASH }}-${{ needs.build-and-push-ee-image.outputs.SUBMODULE_SHORT_HASH }}-${{ inputs.environment }}"
          while true; do
              # Fetch job status from ArgoCD API
              RESPONSE=$(curl -s -k -H "Authorization: Bearer ${{env.ARGOCD_TOKEN}}" "$ARGOCD_API_URL")
          #    echo $RESPONSE

              # Extract and parse the manifest JSON
              MANIFEST=$(echo "$RESPONSE" | jq -r '.manifest' | jq '.')
          #    echo $MANIFEST

              # Extract Start Time, Status, and Type
              START_TIME=$(echo "$MANIFEST" | jq -r '.status.startTime')
              echo $START_TIME
              STATUS=$(echo "$MANIFEST" | jq -r '.status.conditions[] | select(.type=="Complete") | .status')
              echo $STATUS
              TYPE=$(echo "$MANIFEST" | jq -r '.status.conditions[] | select(.type=="Complete") | .type')
              echo $TYPE

              # Extract Image Tag
              IMAGE=$(echo "$MANIFEST" | jq -r '.spec.template.spec.containers[0].image')
              echo $IMAGE
              IMAGE_TAG=$(echo "$IMAGE" | cut -d ':' -f2)  # Extract the tag after the colon
              echo $IMAGE_TAG

              # Print extracted information
              echo "Start Time: $START_TIME"
              echo "Status: $STATUS"
              echo "Type: $TYPE"
              echo "Image: $IMAGE"
              echo "Image Tag: $IMAGE_TAG"

              # Nested condition to check Image Tag and Job Completion
              if [[ "$IMAGE_TAG" == "$TARGET_IMAGE_TAG" ]]; then
                  if [[ "$TYPE" == "Complete" && "$STATUS" == "True" ]]; then
                      echo "✅ DB Sync Job has completed successfully with the correct image tag: $IMAGE_TAG"
                      break
                  else
                      echo "⏳ DB Sync Job is still running... Waiting for completion."
                  fi
              else
                  echo "🚨 Image tag mismatch! Expected: $TARGET_IMAGE_TAG, Found: $IMAGE_TAG"
              fi

              # Wait before the next check
              sleep 10
          done
  
  # Check Front-end changes
  check-apps-changes:
    needs: [check-db-sync-status,build-and-push-ee-image]
    if: ${{ needs.check-db-sync-status.result == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      BACKOFFICE_UPDATED: ${{ steps.check-backoffice.outputs.BACKOFFICE_UPDATED }}
      KYB_UPDATED: ${{ steps.check-kyb.outputs.KYB_UPDATED }}
      DASHBOARD_UPDATED: ${{ steps.check-dashboard.outputs.DASHBOARD_UPDATED }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Ensures we get the history for diff comparison

      - name: Get List of Changed Files
        id: changed-files
        run: |
          echo "Changed files:"
          git diff --name-only HEAD^ HEAD

      - name: Check for Changes in apps/v1
        id: check-backoffice
        run: |
          if git diff --name-only HEAD^ HEAD | grep '^apps/backoffice-v2/' > /dev/null; then
            echo "BACKOFFICE_UPDATED=true" >> "$GITHUB_ENV"
            echo "BACKOFFICE_UPDATED=true" >> "$GITHUB_OUTPUT"
          else
            echo "BACKOFFICE_UPDATED=false" >> "$GITHUB_ENV"
            echo "BACKOFFICE_UPDATED=false" >> "$GITHUB_OUTPUT"
          fi
      
      - name: Check for Changes in apps/v1
        id: check-kyb
        run: |
          if git diff --name-only HEAD^ HEAD | grep '^apps/kyb-app/' > /dev/null; then
            echo "KYB_UPDATED=true" >> "$GITHUB_ENV"
          else
            echo "KYB_UPDATED=false" >> "$GITHUB_ENV"
          fi
      
      - name: Check for Changes in apps/v1
        id: check-dashboard
        run: |
          if git diff --name-only HEAD^ HEAD | grep '^apps/workflows-dashboard/' > /dev/null; then
            echo "DASHBOARD_UPDATED=true" >> "$GITHUB_ENV"
          else
            echo "DASHBOARD_UPDATED=false" >> "$GITHUB_ENV"
          fi

      - name: Print Environment Variables
        run: |
          echo "BACKOFFICE_UPDATED=$BACKOFFICE_UPDATED"
          echo "KYB_UPDATED=$KYB_UPDATED"
          echo "DASHBOARD_UPDATED=$DASHBOARD_UPDATED"

  # TODO Deploy Backoffice trigger
  deploy-backoffice:
    needs: [check-db-sync-status,check-apps-changes]
    if: ${{ needs.check-db-sync-status.result == 'success' && needs.check-apps-changes.outputs.BACKOFFICE_UPDATED == 'true' }}
    uses: ./.github/workflows/deploy-backoffice.yml
    with:
      environment: ${{ inputs.environment }}

  # TODO Deploy KYB Trigger
  deploy-kyb:
    needs: [check-db-sync-status,check-apps-changes]
    if: ${{ needs.check-db-sync-status.result == 'success' && needs.check-apps-changes.outputs.KYB_UPDATED == 'true' }}
    uses: ./.github/workflows/deploy-kyb.yml
    with:
      environment: ${{ inputs.environment }}

  # TODO Deploy Dashboard Trigger
  deploy-dashboard:
    needs: [check-db-sync-status,check-apps-changes]
    if: ${{ needs.check-db-sync-status.result == 'success' && needs.check-apps-changes.outputs.DASHBOARD_UPDATED == 'true' }}
